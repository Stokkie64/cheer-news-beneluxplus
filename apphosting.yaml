# Firebase App Hosting config for the Next.js app.
# Public NEXT_PUBLIC_* vars are safe to inline (they ship to the browser anyway).
# Server-only secrets are pulled from Secret Manager (created during deploy).
# The App Hosting compute service account is granted roles/datastore.user, so
# firebase-admin uses Application Default Credentials — no key file in prod.

runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBfbHTHaWJ_xz7_UbzAI9YvBl81oFu15Hg
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: cheer-news-beneluxplus.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: cheer-news-beneluxplus
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: cheer-news-beneluxplus.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "905972192942"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:905972192942:web:1e9e6ac1fe97db7288bf3f"
    availability:
      - BUILD
      - RUNTIME
  - variable: GCP_PROJECT_ID
    value: cheer-news-beneluxplus
    availability:
      - RUNTIME
  - variable: GEMINI_MODEL
    value: gemini-2.5-flash
    availability:
      - RUNTIME
  - variable: ADMIN_EMAILS
    value: wonnink.jesse@gmail.com
    availability:
      - RUNTIME
  # Gmail address used to send maintainer notification emails (not a secret).
  - variable: GMAIL_USER
    value: wonnink.jesse@gmail.com
    availability:
      - RUNTIME
  # Server-only secrets (create with: firebase apphosting:secrets:set <name>).
  # Turnstile is optional — the submission form degrades gracefully without it.
  # Add TURNSTILE_SECRET_KEY / NEXT_PUBLIC_TURNSTILE_SITE_KEY here once configured.
  - variable: GEMINI_API_KEY
    secret: gemini-api-key
    availability:
      - RUNTIME
  # Gmail app password for submission notifications (requires 2FA on the account).
  # Create with: firebase apphosting:secrets:set gmail-app-password
  - variable: GMAIL_APP_PASSWORD
    secret: gmail-app-password
    availability:
      - RUNTIME
