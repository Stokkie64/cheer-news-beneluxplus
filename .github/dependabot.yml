version: 2
updates:
  # npm dependencies — weekly, grouped to keep PR noise low.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
    labels:
      - dependencies

  # GitHub Actions — keeps the SHA-pinned actions current (Dependabot updates
  # the pin and the trailing version comment together).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
